services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8500:8500"
    volumes:
      - chromadb_data:/app/data/chromadb
      - hf_cache:/root/.cache/huggingface
    depends_on:
      minio:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  chromadb_data:
  hf_cache:
  minio_data:
