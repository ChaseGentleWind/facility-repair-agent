services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8500:8500"
    volumes:
      - chromadb_data:/app/data/chromadb
      - hf_cache:/root/.cache/huggingface

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  chromadb_data:
  hf_cache:
