<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设施报修 Agent — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .layout { display: flex; min-height: 100vh; }
    .left-pane { flex: 1; min-height: 100vh; position: relative; }
    .right-pane {
      width: 420px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow-y: auto;
    }
    .right-pane h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1f1f1f;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .ticket-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      gap: 8px;
    }
    .ticket-placeholder svg { width: 40px; height: 40px; opacity: 0.3; }
    .ticket-card { display: none; flex-direction: column; }
    .ticket-card.visible { display: flex; }
    .ticket-meta { font-size: 11px; color: #8c8c8c; margin-bottom: 16px; }

    .field-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .field-row:last-of-type { border-bottom: none; }
    .field-label {
      font-size: 11px;
      color: #8c8c8c;
      margin-bottom: 4px;
    }
    .field-label .required { color: #ff4d4f; margin-left: 2px; }

    .field-input {
      width: 100%;
      font-size: 14px;
      color: #1f1f1f;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: #1677ff; }
    .field-input:disabled {
      background: #f5f5f5;
      color: #8c8c8c;
      cursor: not-allowed;
    }

    .field-select {
      width: 100%;
      font-size: 14px;
      color: #1f1f1f;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 6px 10px;
      outline: none;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .field-select:focus { border-color: #1677ff; }
    .field-select:disabled {
      background: #f5f5f5;
      color: #8c8c8c;
      cursor: not-allowed;
    }

    .field-value {
      font-size: 14px;
      color: #1f1f1f;
      min-height: 22px;
      border-radius: 4px;
      padding: 2px 4px;
      margin: 0 -4px;
      outline: none;
      transition: background 0.15s;
      word-break: break-all;
    }

    .location-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .location-group .loc-item { display: flex; flex-direction: column; gap: 4px; }
    .location-group .loc-label { font-size: 11px; color: #8c8c8c; }

    /* 上门时间 picker */
    .visit-time-wrap { display: flex; gap: 10px; align-items: flex-start; }
    .visit-time-wrap input[type="date"],
    .visit-time-wrap input[type="time"] {
      flex: 1;
      font-size: 14px;
      border: 1px solid #d9d9d9;
      border-radius: 6px;
      padding: 6px 10px;
      outline: none;
      color: #1f1f1f;
      transition: border-color 0.2s;
    }
    .visit-time-wrap input:focus { border-color: #1677ff; }
    .visit-time-wrap input:disabled {
      background: #f5f5f5;
      color: #8c8c8c;
      cursor: not-allowed;
    }

    /* Images */
    .images-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .img-item { position: relative; width: 80px; height: 80px; }
    .img-item img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
      cursor: pointer;
      display: block;
    }
    .img-delete {
      position: absolute;
      top: -6px; right: -6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 13px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      display: none;
      user-select: none;
    }
    .img-item:hover .img-delete { display: block; }
    .no-image { font-size: 13px; color: #bbb; }

    /* Buttons */
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    .btn-submit {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: #1677ff;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #4096ff; }
    .btn-submit.submitted { background: #52c41a; cursor: default; }
    .btn-submit:disabled { background: #d9d9d9; cursor: not-allowed; }

    .btn-revoke {
      flex: 1;
      height: 40px;
      border: 1px solid #ff4d4f;
      border-radius: 8px;
      background: #fff;
      color: #ff4d4f;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
    }
    .btn-revoke:hover { background: #fff1f0; }
    .btn-revoke.visible { display: block; }

    /* Locked state overlay */
    .ticket-card.locked .field-input,
    .ticket-card.locked .field-select,
    .ticket-card.locked input[type="date"],
    .ticket-card.locked input[type="time"] {
      background: #f5f5f5;
      color: #8c8c8c;
      cursor: not-allowed;
      pointer-events: none;
    }
    .ticket-card.locked .img-delete { display: none !important; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left-pane">
      <repair-agent data-config='{"apiBase":"","clientId":"demo_001","position":"bottom-right","themeColor":"#1677ff"}'></repair-agent>
    </div>

    <div class="right-pane">
      <h2>工单详情</h2>

      <div class="ticket-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        <span>完成报修对话后<br/>工单信息将在此展示</span>
      </div>

      <div class="ticket-card" id="ticket-card">
        <div class="ticket-meta" id="ticket-meta"></div>

        <!-- 报修类型 -->
        <div class="field-row">
          <div class="field-label">报修类型<span class="required">*</span></div>
          <select class="field-select" id="f-repair-type">
            <option value="公共报修">公共报修</option>
            <option value="公司报修">公司报修</option>
            <option value="公寓报修">公寓报修</option>
          </select>
        </div>

        <!-- 故障类型 -->
        <div class="field-row">
          <div class="field-label">故障类型<span class="required">*</span></div>
          <select class="field-select" id="f-fault-type">
            <option value="">请选择</option>
            <option value="电气报修类">电气报修类</option>
            <option value="给排水报修类">给排水报修类</option>
            <option value="公共设备设施保修类">公共设备设施保修类</option>
            <option value="公寓维修类">公寓维修类</option>
            <option value="空调报修类">空调报修类</option>
            <option value="土木工保修类">土木工保修类</option>
          </select>
        </div>

        <!-- 位置 -->
        <div class="field-row">
          <div class="field-label">位置</div>
          <div class="location-group">
            <div class="loc-item">
              <span class="loc-label">楼盘<span class="required">*</span></span>
              <input class="field-input" id="f-estate" placeholder="楼盘" />
            </div>
            <div class="loc-item">
              <span class="loc-label">楼栋<span class="required">*</span></span>
              <input class="field-input" id="f-building" placeholder="楼栋" />
            </div>
            <div class="loc-item">
              <span class="loc-label">楼层<span class="required">*</span></span>
              <input class="field-input" id="f-floor" placeholder="楼层" />
            </div>
            <div class="loc-item">
              <span class="loc-label">房间</span>
              <input class="field-input" id="f-room" placeholder="选填" />
            </div>
          </div>
        </div>

        <!-- 报修描述 -->
        <div class="field-row">
          <div class="field-label">报修描述<span class="required">*</span></div>
          <input class="field-input" id="f-description" placeholder="报修描述" />
        </div>

        <!-- 图片 -->
        <div class="field-row">
          <div class="field-label">图片</div>
          <div class="images-wrap" id="f-images"></div>
        </div>

        <!-- 上门时间 -->
        <div class="field-row">
          <div class="field-label">上门时间<span class="required">*</span></div>
          <div class="visit-time-wrap">
            <input type="date" id="f-visit-date" />
            <input type="time" id="f-visit-time" />
          </div>
        </div>

        <!-- 按钮 -->
        <div class="btn-group">
          <button class="btn-submit" id="btn-submit">提交工单</button>
          <button class="btn-revoke" id="btn-revoke">撤回</button>
        </div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script type="module" src="/src/repair-agent.ts"></script>

  <script>
    // ── Ticket State ──────────────────────────────────────────────────────
    let currentTicket = null
    let isSubmitted = false

    function renderTicket(ticket) {
      currentTicket = ticket
      isSubmitted = false

      document.getElementById('placeholder').style.display = 'none'
      const card = document.getElementById('ticket-card')
      card.classList.add('visible')
      card.classList.remove('locked')

      document.getElementById('ticket-meta').textContent =
        'ID: ' + ticket.ticket_id + '  |  维修单号: ' + ticket.repair_no

      // 报修类型
      const repairTypeEl = document.getElementById('f-repair-type')
      repairTypeEl.value = ticket.repair_type || '公司报修'
      repairTypeEl.disabled = false

      // 故障类型
      const faultTypeEl = document.getElementById('f-fault-type')
      const ft = ticket.fault_type || {}
      const ftName = ft.displayName || ''
      faultTypeEl.value = ftName
      if (!faultTypeEl.value) faultTypeEl.value = ''
      faultTypeEl.disabled = false

      // 位置
      const loc = ticket.location || {}
      document.getElementById('f-estate').value = loc.estate || ''
      document.getElementById('f-building').value = loc.building || ''
      document.getElementById('f-floor').value = loc.floor || ''
      document.getElementById('f-room').value = loc.unit || ''

      // 描述
      document.getElementById('f-description').value = ticket.problem_description || ''

      // 图片
      const wrap = document.getElementById('f-images')
      wrap.innerHTML = ''
      const urls = ticket.image_urls || []
      if (urls.length === 0) {
        wrap.innerHTML = '<span class="no-image">暂无图片</span>'
      } else {
        urls.forEach(function(url) { wrap.appendChild(createImgItem(url)) })
      }

      // 上门时间
      parseVisitTime(ticket.visit_time || '')

      // 按钮状态
      const btnSubmit = document.getElementById('btn-submit')
      btnSubmit.textContent = '提交工单'
      btnSubmit.classList.remove('submitted')
      btnSubmit.disabled = false
      document.getElementById('btn-revoke').classList.remove('visible')
    }

    function parseVisitTime(timeStr) {
      const dateInput = document.getElementById('f-visit-date')
      const timeInput = document.getElementById('f-visit-time')
      const now = new Date()

      const match = timeStr.match(/(\d+)月(\d+)日/)
      if (match) {
        const month = parseInt(match[1])
        const day = parseInt(match[2])
        const year = now.getFullYear()
        dateInput.value = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0')
      } else {
        dateInput.value = ''
      }

      const timeMatch = timeStr.match(/(\d+)时(\d+)分/)
      if (timeMatch) {
        timeInput.value = String(parseInt(timeMatch[1])).padStart(2, '0') + ':' + String(parseInt(timeMatch[2])).padStart(2, '0')
      } else {
        timeInput.value = ''
      }
    }

    function getVisitTimeString() {
      const dateVal = document.getElementById('f-visit-date').value
      const timeVal = document.getElementById('f-visit-time').value
      if (!dateVal) return ''
      const parts = dateVal.split('-')
      const month = parseInt(parts[1])
      const day = parseInt(parts[2])
      if (!timeVal) return month + '月' + day + '日'
      const timeParts = timeVal.split(':')
      const hour = parseInt(timeParts[0])
      const minute = parseInt(timeParts[1])
      return month + '月' + day + '日 ' + hour + '时' + String(minute).padStart(2, '0') + '分'
    }

    function createImgItem(url) {
      const item = document.createElement('div')
      item.className = 'img-item'

      const img = document.createElement('img')
      img.src = url
      img.alt = '报修图片'
      img.addEventListener('click', function() { openLightbox(url) })

      const del = document.createElement('span')
      del.className = 'img-delete'
      del.textContent = '×'
      del.title = '删除图片'
      del.addEventListener('click', function(e) {
        e.stopPropagation()
        item.remove()
        const w = document.getElementById('f-images')
        if (w.querySelectorAll('.img-item').length === 0) {
          w.innerHTML = '<span class="no-image">暂无图片</span>'
        }
      })

      item.appendChild(img)
      item.appendChild(del)
      return item
    }

    // ── Lock / Unlock ─────────────────────────────────────────────────────
    function lockTicket() {
      const card = document.getElementById('ticket-card')
      card.classList.add('locked')

      document.getElementById('f-repair-type').disabled = true
      document.getElementById('f-fault-type').disabled = true
      document.getElementById('f-estate').disabled = true
      document.getElementById('f-building').disabled = true
      document.getElementById('f-floor').disabled = true
      document.getElementById('f-room').disabled = true
      document.getElementById('f-description').disabled = true
      document.getElementById('f-visit-date').disabled = true
      document.getElementById('f-visit-time').disabled = true
    }

    function unlockTicket() {
      const card = document.getElementById('ticket-card')
      card.classList.remove('locked')

      document.getElementById('f-repair-type').disabled = false
      document.getElementById('f-fault-type').disabled = false
      document.getElementById('f-estate').disabled = false
      document.getElementById('f-building').disabled = false
      document.getElementById('f-floor').disabled = false
      document.getElementById('f-room').disabled = false
      document.getElementById('f-description').disabled = false
      document.getElementById('f-visit-date').disabled = false
      document.getElementById('f-visit-time').disabled = false
    }

    // ── Submit ────────────────────────────────────────────────────────────
    document.getElementById('btn-submit').addEventListener('click', async function() {
      if (isSubmitted) return

      const widget = document.querySelector('repair-agent')
      const store = widget && widget._store
      const sessionId = store && store.sessionId

      if (!sessionId) {
        alert('会话未初始化，请先完成对话')
        return
      }

      try {
        const resp = await fetch('/api/v1/ticket/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId })
        })
        const data = await resp.json()

        if (data.success) {
          isSubmitted = true
          this.classList.add('submitted')
          this.textContent = '已提交'
          document.getElementById('btn-revoke').classList.add('visible')
          lockTicket()
        } else {
          alert(data.detail || data.message || '提交失败')
        }
      } catch (err) {
        alert('网络错误: ' + err.message)
      }
    })

    // ── Revoke ────────────────────────────────────────────────────────────
    document.getElementById('btn-revoke').addEventListener('click', function() {
      isSubmitted = false
      unlockTicket()

      const btnSubmit = document.getElementById('btn-submit')
      btnSubmit.classList.remove('submitted')
      btnSubmit.textContent = '提交工单'
      this.classList.remove('visible')
    })

    // ── Lightbox ──────────────────────────────────────────────────────────
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url
      document.getElementById('lightbox').classList.add('open')
    }
    document.getElementById('lightbox-close').addEventListener('click', function() {
      document.getElementById('lightbox').classList.remove('open')
    })
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open')
    })

    // ── Events ────────────────────────────────────────────────────────────
    document.addEventListener('onRepairTicketGenerated', function(e) {
      renderTicket(e.detail)
      console.log('工单 JSON:', e.detail)
    })
    document.addEventListener('onRequestHumanService', function(e) {
      console.log('转人工:', e.detail)
    })
  </script>
</body>
</html>
