<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设施报修 Agent — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }
    .layout { display: flex; min-height: 100vh; }
    .left-pane { flex: 1; min-height: 100vh; position: relative; }
    .right-pane {
      width: 380px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow-y: auto;
    }
    .right-pane h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1f1f1f;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .ticket-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 13px;
      text-align: center;
      gap: 8px;
    }
    .ticket-placeholder svg { width: 40px; height: 40px; opacity: 0.3; }
    .ticket-card { display: none; flex-direction: column; }
    .ticket-card.visible { display: flex; }
    .ticket-meta { font-size: 11px; color: #8c8c8c; margin-bottom: 16px; }
    .field-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .field-row:last-of-type { border-bottom: none; }
    .field-label { font-size: 11px; color: #8c8c8c; margin-bottom: 4px; }
    .field-value {
      font-size: 14px;
      color: #1f1f1f;
      min-height: 22px;
      border-radius: 4px;
      padding: 2px 4px;
      margin: 0 -4px;
      outline: none;
      transition: background 0.15s;
      word-break: break-all;
    }
    .field-value:hover { background: #f5f5f5; }
    .field-value:focus { background: #e6f4ff; }
    .images-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .images-wrap img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
      cursor: pointer;
    }
    .no-image { font-size: 13px; color: #bbb; }
    .btn-submit {
      margin-top: 20px;
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: #1677ff;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #4096ff; }
    .btn-submit.submitted { background: #52c41a; cursor: default; }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .lightbox-close {
      position: absolute;
      top: 16px; right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left-pane">
      <repair-agent data-config='{"apiBase":"","clientId":"demo_001","position":"bottom-right","themeColor":"#1677ff"}'></repair-agent>
    </div>

    <div class="right-pane">
      <h2>工单详情</h2>

      <div class="ticket-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
          <line x1="9" y1="16" x2="13" y2="16"/>
        </svg>
        <span>完成报修对话后<br/>工单信息将在此展示</span>
      </div>

      <div class="ticket-card" id="ticket-card">
        <div class="ticket-meta" id="ticket-meta"></div>

        <div class="field-row">
          <div class="field-label">位置</div>
          <div class="field-value" id="f-location" contenteditable="true"></div>
        </div>
        <div class="field-row">
          <div class="field-label">报修描述</div>
          <div class="field-value" id="f-description" contenteditable="true"></div>
        </div>
        <div class="field-row">
          <div class="field-label">图片</div>
          <div class="images-wrap" id="f-images"></div>
        </div>
        <div class="field-row">
          <div class="field-label">故障类型</div>
          <div class="field-value" id="f-fault-type" contenteditable="true"></div>
        </div>
        <div class="field-row">
          <div class="field-label">上门时间</div>
          <div class="field-value" id="f-visit-time" contenteditable="true"></div>
        </div>

        <button class="btn-submit" id="btn-submit">提交工单</button>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script type="module" src="/src/repair-agent.ts"></script>

  <script>
    function renderTicket(ticket) {
      document.getElementById('placeholder').style.display = 'none'
      const card = document.getElementById('ticket-card')
      card.classList.add('visible')

      document.getElementById('ticket-meta').textContent =
        'ID: ' + ticket.ticket_id + '  |  维修单号: ' + ticket.repair_no

      const loc = ticket.location || {}
      document.getElementById('f-location').textContent =
        [loc.estate, loc.building, loc.floor, loc.unit].filter(Boolean).join(' ') || '—'

      document.getElementById('f-description').textContent =
        ticket.problem_description || '—'

      const wrap = document.getElementById('f-images')
      wrap.innerHTML = ''
      const urls = ticket.image_urls || []
      if (urls.length === 0) {
        wrap.innerHTML = '<span class="no-image">暂无图片</span>'
      } else {
        urls.forEach(function(url) {
          const img = document.createElement('img')
          img.src = url
          img.alt = '报修图片'
          img.addEventListener('click', function() { openLightbox(url) })
          wrap.appendChild(img)
        })
      }

      const ft = ticket.fault_type || {}
      document.getElementById('f-fault-type').textContent = ft.displayName || '—'
      document.getElementById('f-visit-time').textContent = ticket.visit_time || '—'

      const btn = document.getElementById('btn-submit')
      btn.textContent = '提交工单'
      btn.classList.remove('submitted')
    }

    document.getElementById('btn-submit').addEventListener('click', function() {
      if (this.classList.contains('submitted')) return
      this.classList.add('submitted')
      this.textContent = '已提交'
    })

    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url
      document.getElementById('lightbox').classList.add('open')
    }
    document.getElementById('lightbox-close').addEventListener('click', function() {
      document.getElementById('lightbox').classList.remove('open')
    })
    document.getElementById('lightbox').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open')
    })

    document.addEventListener('onRepairTicketGenerated', function(e) {
      renderTicket(e.detail)
      console.log('工单 JSON:', e.detail)
    })
    document.addEventListener('onRequestHumanService', function(e) {
      console.log('转人工:', e.detail)
    })
  </script>
</body>
</html>
